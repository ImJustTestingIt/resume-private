<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Resume</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <h1>Memory Resume</h1>
        <p>A list of moments worth keeping.</p>
      </div>
      <button id="exportBtn" class="icon-button" type="button" title="Export JSON">Export</button>
    </header>

    <section class="notice" aria-label="Privacy notice">
      This extension stores only the memories you write here. It does not read pages, collect browsing activity, or build profiles about people.
    </section>

    <form id="memoryForm" class="memory-form">
      <label>
        Memory title
        <input id="titleInput" name="title" type="text" autocomplete="off" placeholder="The day the old plan finally worked">
      </label>

      <label>
        Memory
        <textarea id="memoryInput" name="memory" rows="5" placeholder="What happened? What do you want to remember?"></textarea>
      </label>

      <div class="field-row">
        <label>
          When
          <input id="whenInput" name="when" type="text" autocomplete="off" placeholder="Spring 2026">
        </label>

        <label>
          Feeling
          <input id="feelingInput" name="feeling" type="text" autocomplete="off" placeholder="Grateful">
        </label>
      </div>

      <button class="primary" type="submit">Save memory</button>
    </form>

    <section class="saved-section">
      <div class="section-heading">
        <h2>Saved memories</h2>
        <button id="clearBtn" class="danger" type="button">Clear all</button>
      </div>
      <ol id="memoriesList" class="memories-list"></ol>
      <p id="emptyState" class="empty-state">No memories yet.</p>
    </section>
  </main>

  <template id="memoryTemplate">
    <li class="memory-card">
      <div class="memory-card-header">
        <h3></h3>
        <button class="delete-button" type="button" title="Delete memory">Delete</button>
      </div>
      <p class="memory-text"></p>
      <dl class="memory-meta"></dl>
      <time></time>
    </li>
  </template>

  <script src="popup.js"></script>
</body>
</html>
